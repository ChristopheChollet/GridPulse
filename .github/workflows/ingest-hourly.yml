name: Ingest hourly

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingestion
        run: |
          curl -sf -X POST "${{ secrets.GRIDPULSE_API_URL }}/ingest/run" \
            -H "X-Ingest-Secret: ${{ secrets.INGEST_SECRET }}" \
            -H "Content-Type: application/json"
